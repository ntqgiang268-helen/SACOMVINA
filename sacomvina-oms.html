<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacomvina Logistics – Hệ thống Quản lý Nội bộ</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            navy: { 900: '#0F1D2E', 800: '#102A43', 700: '#1A3A52' },
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .sidebar-item {
      transition: all 0.18s ease;
    }

    .sidebar-item:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .sidebar-item.active {
      background-color: #1D6EDB;
      border-left: 4px solid #60ABFF;
    }

    .sidebar-item:not(.active) {
      border-left: 4px solid transparent;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
    }

    .btn-primary {
      background: #1D6EDB;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: #1558B0;
    }

    .btn-success {
      background: #16A34A;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-success:hover {
      background: #15803D;
    }

    .btn-danger {
      background: #DC2626;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-danger:hover {
      background: #B91C1C;
    }

    .btn-warning {
      background: #D97706;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      transition: background 0.15s;
    }

    .btn-warning:hover {
      background: #B45309;
    }

    .input-lg {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      outline: none;
      transition: border 0.15s;
      background: #FAFAFA;
    }

    .input-lg:focus {
      border-color: #1D6EDB;
      background: #fff;
    }

    .select-lg {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      outline: none;
      background: #FAFAFA;
    }

    .select-lg:focus {
      border-color: #1D6EDB;
      background: #fff;
    }

    .label-lg {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .badge-ok {
      background: #DCFCE7;
      color: #16A34A;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .badge-warn {
      background: #FEF3C7;
      color: #D97706;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .badge-danger {
      background: #FEE2E2;
      color: #DC2626;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .fade-in {
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22C55E;
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(34, 197, 94, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 3px;
    }
  </style>
</head>

<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────── MOCK DATA ───────────────
    const MAINTENANCE_HISTORY = [
      { id: 'WO-2024-031', plate: '51C-888.88', type: 'Bảo dưỡng định kỳ', parts: 'Dầu nhớt, Lọc gió', partCode: 'OI-LB-0031', date: '28/02/2026', status: 'Hoàn thành', staff: 'Nguyễn Văn A' },
      { id: 'WO-2024-030', plate: '62B-123.45', type: 'Sửa chữa hư hỏng', parts: 'Má phanh trước', partCode: 'BK-FR-0030', date: '27/02/2026', status: 'Đang thực hiện', staff: 'Trần Thị B' },
      { id: 'WO-2024-029', plate: '79A-567.00', type: 'Bảo dưỡng định kỳ', parts: 'Dây cu roa, Bơm nước', partCode: 'BL-WP-0029', date: '25/02/2026', status: 'Hoàn thành', staff: 'Lê Văn C' },
      { id: 'WO-2024-028', plate: '51C-999.11', type: 'Sửa chữa hư hỏng', parts: 'Bình ắc-quy', partCode: 'BT-12V-0028', date: '22/02/2026', status: 'Hoàn thành', staff: 'Phạm Thị D' },
    ];

    const COMPANIES = [
      { id: 1, name: 'Công ty TNHH Hưng Phát', quota: 10, current: 4, expiry: '31/12/2026' },
      { id: 2, name: 'Cty CP Vận tải Đông Nam', quota: 5, current: 5, expiry: '30/06/2026' },
      { id: 3, name: 'Cty TNHH TM Minh Khoa', quota: 8, current: 7, expiry: '31/12/2026' },
      { id: 4, name: 'Công ty CP Lương thực An Giang', quota: 12, current: 2, expiry: '31/03/2027' },
      { id: 5, name: 'Cty TNHH Xuất nhập khẩu Bình Minh', quota: 6, current: 6, expiry: '15/04/2026' },
    ];

    const GATE_LOG = [
      { time: '22:41', company: 'Cty TNHH TM Minh Khoa', action: 'VÀO', plate: '51C-123.45' },
      { time: '22:19', company: 'Cty TNHH TM Minh Khoa', action: 'VÀO', plate: '51C-234.56' },
      { time: '21:55', company: 'Công ty TNHH Hưng Phát', action: 'RA', plate: '62B-345.67' },
      { time: '21:30', company: 'Cty CP Vận tải Đông Nam', action: 'VÀO', plate: '79A-456.78' },
      { time: '20:58', company: 'Công ty TNHH Hưng Phát', action: 'VÀO', plate: '79A-567.89' },
    ];

    const LIFT_HISTORY = [
      { id: 'LH-0045', company: 'Công ty TNHH Hưng Phát', action: 'NÂNG', weight: 18, hasCrew: true, start: '21:05', end: '21:40', duration: '35 phút', date: '02/03/2026' },
      { id: 'LH-0044', company: 'Cty CP Vận tải Đông Nam', action: 'HẠ', weight: 22, hasCrew: false, start: '19:30', end: '20:10', duration: '40 phút', date: '02/03/2026' },
      { id: 'LH-0043', company: 'Cty TNHH TM Minh Khoa', action: 'NÂNG', weight: 15, hasCrew: true, start: '08:00', end: '08:30', duration: '30 phút', date: '02/03/2026' },
    ];

    // ─────────────── ICONS (Lucide via window.lucide) ───────────────
    function Icon({ name, size = 20, className = '' }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const iconFn = window.lucide[name.replace(/-./g, m => m[1].toUpperCase())];
          if (iconFn) {
            const svg = iconFn.toSvg({ width: size, height: size, class: className });
            ref.current.innerHTML = svg;
          }
        }
      }, [name, size, className]);
      return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center' }} />;
    }

    // ─────────────── TOPBAR ───────────────
    function Topbar({ activeTab }) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
      const dateStr = now.toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
      return (
        <header className="bg-white shadow-sm px-6 py-3 flex items-center justify-between sticky top-0 z-10" style={{ minHeight: 64 }}>
          <div className="flex items-center gap-3">
            <div className="flex items-center justify-center w-9 h-9 rounded-lg" style={{ background: '#1D6EDB' }}>
              <Icon name="truck" size={20} className="text-white" />
            </div>
            <div>
              <div className="font-extrabold text-gray-900 text-lg leading-tight tracking-tight">SACOMVINA LOGISTICS</div>
              <div className="text-xs text-gray-400">{dateStr} · {timeStr}</div>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button className="relative p-2 rounded-lg hover:bg-gray-100 text-gray-500">
              <Icon name="bell" size={22} />
              <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
            <div className="flex items-center gap-2 cursor-pointer hover:bg-gray-50 px-3 py-1.5 rounded-lg">
              <div className="w-9 h-9 rounded-full flex items-center justify-center font-bold text-white text-sm" style={{ background: '#1D6EDB' }}>NV</div>
              <div className="hidden sm:block">
                <div className="text-sm font-700 text-gray-800 font-semibold">Nguyễn Văn Nam</div>
                <div className="text-xs text-gray-400">Quản đốc</div>
              </div>
            </div>
          </div>
        </header>
      );
    }

    // ─────────────── SIDEBAR ───────────────
    const NAV_ITEMS = [
      { key: 'maintenance', label: 'Bảo Dưỡng Xe', icon: 'wrench', sub: 'Lệnh bảo dưỡng & vật tư' },
      { key: 'gate', label: 'Kiểm Soát Cổng', icon: 'shield-check', sub: 'Quota & ra/vào xe' },
      { key: 'lift', label: 'Nâng Hạ Hàng', icon: 'arrow-up-down', sub: 'Lệnh nâng hạ & thời gian' },
    ];

    function Sidebar({ active, setActive }) {
      return (
        <aside className="flex flex-col h-full" style={{ background: '#102A43', width: 230, minWidth: 230, flexShrink: 0 }}>
          <div className="px-5 pt-5 pb-4 border-b border-white/10">
            <div className="text-xs font-bold text-white/40 uppercase tracking-widest">CHỨC NĂNG</div>
          </div>
          <nav className="flex-1 py-3 space-y-1 px-2">
            {NAV_ITEMS.map(item => (
              <button
                key={item.key}
                onClick={() => setActive(item.key)}
                className={`sidebar-item w-full text-left flex items-center gap-3 px-3 py-3.5 rounded-lg ${active === item.key ? 'active' : ''}`}
              >
                <span className={`flex-shrink-0 ${active === item.key ? 'text-white' : 'text-white/60'}`}>
                  <Icon name={item.icon} size={22} />
                </span>
                <div>
                  <div className={`text-sm font-bold leading-tight ${active === item.key ? 'text-white' : 'text-white/80'}`}>{item.label}</div>
                  <div className="text-xs text-white/40 mt-0.5">{item.sub}</div>
                </div>
              </button>
            ))}
          </nav>
          <div className="px-4 py-4 border-t border-white/10">
            <div className="flex items-center gap-2">
              <span className="pulse-dot"></span>
              <span className="text-xs text-white/50">Hệ thống đang hoạt động</span>
            </div>
            <div className="text-xs text-white/30 mt-1">v2.1.0 – 02/03/2026</div>
          </div>
        </aside>
      );
    }

    // ─────────────── TAB 1: MAINTENANCE ───────────────
    function MaintenanceTab() {
      const [form, setForm] = useState({ plate: '', jobType: '', partName: '', qty: '', partCode: '' });
      const [history, setHistory] = useState(MAINTENANCE_HISTORY);
      const [submitted, setSubmitted] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!form.plate || !form.jobType || !form.partName || !form.qty) return;
        const newOrder = {
          id: `WO-2024-0${32 + history.length}`,
          plate: form.plate.toUpperCase(),
          type: form.jobType,
          parts: form.partName,
          partCode: form.partCode || `AUTO-${Date.now().toString().slice(-6)}`,
          date: new Date().toLocaleDateString('vi-VN'),
          status: 'Đang thực hiện',
          staff: 'Nguyễn Văn Nam',
        };
        setHistory([newOrder, ...history]);
        setForm({ plate: '', jobType: '', partName: '', qty: '', partCode: '' });
        setSubmitted(true);
        setTimeout(() => setSubmitted(false), 3000);
      };

      return (
        <div className="fade-in grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
          {/* LEFT: Form */}
          <div className="card p-6 flex flex-col gap-5">
            <div>
              <h2 className="text-xl font-extrabold text-gray-900 flex items-center gap-2">
                <Icon name="plus-circle" size={24} className="text-blue-600" /> Tạo Lệnh Bảo Dưỡng Mới
              </h2>
              <p className="text-sm text-gray-500 mt-1">Điền đầy đủ thông tin → Bấm nút Tạo Lệnh & Xuất Kho</p>
            </div>

            {submitted && (
              <div className="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 font-bold text-base fade-in">
                <Icon name="check-circle" size={20} /> Tạo lệnh thành công! Vật tư đã được xuất kho.
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="label-lg">🚗 Biển số xe</label>
                <input
                  className="input-lg"
                  placeholder="Ví dụ: 51C-888.88"
                  value={form.plate}
                  onChange={e => setForm({ ...form, plate: e.target.value })}
                  required
                />
              </div>

              <div>
                <label className="label-lg">🔧 Loại công việc</label>
                <select
                  className="select-lg"
                  value={form.jobType}
                  onChange={e => setForm({ ...form, jobType: e.target.value })}
                  required
                >
                  <option value="">-- Chọn loại công việc --</option>
                  <option value="Bảo dưỡng định kỳ">Bảo dưỡng định kỳ</option>
                  <option value="Sửa chữa hư hỏng">Sửa chữa hư hỏng</option>
                </select>
              </div>

              <div className="grid grid-cols-3 gap-3">
                <div className="col-span-2">
                  <label className="label-lg">📦 Tên vật tư / Loại vật tư</label>
                  <input
                    className="input-lg"
                    placeholder="Ví dụ: Dầu nhớt 10W-40"
                    value={form.partName}
                    onChange={e => setForm({ ...form, partName: e.target.value })}
                    required
                  />
                </div>
                <div>
                  <label className="label-lg">Số lượng</label>
                  <input
                    className="input-lg"
                    type="number"
                    min="1"
                    placeholder="0"
                    value={form.qty}
                    onChange={e => setForm({ ...form, qty: e.target.value })}
                    required
                  />
                </div>
              </div>

              <div>
                <label className="label-lg">🔖 Mã định danh vật tư (Serial / QR)</label>
                <input
                  className="input-lg"
                  placeholder="Quét mã hoặc nhập tay – Để trống: Tự động tạo mã"
                  value={form.partCode}
                  onChange={e => setForm({ ...form, partCode: e.target.value })}
                />
                <p className="text-xs text-gray-400 mt-1">Nếu để trống, hệ thống sẽ tự sinh mã định danh duy nhất khi tạo lệnh.</p>
              </div>

              <button type="submit" className="btn-primary w-full py-4 text-lg flex items-center justify-center gap-3 mt-2">
                <Icon name="clipboard-check" size={22} /> TẠO LỆNH &amp; XUẤT KHO
              </button>
            </form>
          </div>

          {/* RIGHT: History */}
          <div className="card p-6 flex flex-col gap-4 overflow-hidden">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-extrabold text-gray-900 flex items-center gap-2">
                <Icon name="list" size={22} className="text-gray-600" /> Lịch Sử Bảo Dưỡng
              </h2>
              <span className="text-sm font-semibold text-gray-500">{history.length} lệnh</span>
            </div>
            <div className="overflow-y-auto space-y-3 flex-1">
              {history.map((h, i) => (
                <div key={h.id} className={`border rounded-lg p-4 ${h.status === 'Đang thực hiện' ? 'border-blue-200 bg-blue-50' : 'border-gray-100 bg-white'}`}>
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-extrabold text-gray-900 text-base">{h.plate}</span>
                        <span className="text-xs font-semibold text-gray-400">{h.id}</span>
                      </div>
                      <div className="text-sm text-gray-600 mt-0.5">{h.type}</div>
                      <div className="text-sm text-gray-700 mt-1">
                        <span className="font-semibold">Vật tư:</span> {h.parts}
                      </div>
                      <div className="text-xs text-gray-400 mt-0.5">Mã: <span className="font-mono">{h.partCode}</span></div>
                    </div>
                    <div className="flex-shrink-0 text-right">
                      <span className={h.status === 'Hoàn thành' ? 'badge-ok' : 'badge-warn'}>{h.status}</span>
                      <div className="text-xs text-gray-400 mt-1">{h.date}</div>
                      <div className="text-xs text-gray-400">{h.staff}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────── TAB 2: GATE CONTROL ───────────────
    function GateTab() {
      const [companies, setCompanies] = useState(COMPANIES);
      const [selectedCompanyId, setSelectedCompanyId] = useState('');
      const [log, setLog] = useState(GATE_LOG);
      const [plate, setPlate] = useState('');
      const [flash, setFlash] = useState(null); // 'in' | 'out'

      const selected = companies.find(c => c.id === Number(selectedCompanyId));
      const isFull = selected && selected.current >= selected.quota;
      const isNearFull = selected && !isFull && selected.current >= selected.quota - 1;

      const handleGateAction = (action) => {
        if (!selected) return;
        const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        const plateDisp = plate.trim().toUpperCase() || '??-???';

        if (action === 'in') {
          if (isFull) return;
          setCompanies(companies.map(c => c.id === selected.id ? { ...c, current: c.current + 1 } : c));
          setLog([{ time: now, company: selected.name, action: 'VÀO', plate: plateDisp }, ...log]);
          setFlash('in');
        } else {
          if (selected.current <= 0) return;
          setCompanies(companies.map(c => c.id === selected.id ? { ...c, current: c.current - 1 } : c));
          setLog([{ time: now, company: selected.name, action: 'RA', plate: plateDisp }, ...log]);
          setFlash('out');
        }
        setPlate('');
        setTimeout(() => setFlash(null), 1800);
      };

      return (
        <div className="fade-in grid grid-cols-1 lg:grid-cols-2 gap-6">
          {/* LEFT: Action Panel */}
          <div className="card p-6 flex flex-col gap-5">
            <div>
              <h2 className="text-xl font-extrabold text-gray-900 flex items-center gap-2">
                <Icon name="shield-check" size={24} className="text-blue-600" /> Kiểm Soát Cổng
              </h2>
              <p className="text-sm text-gray-500 mt-1">Chọn đơn vị → Xem trạng thái → Cho xe vào / ra</p>
            </div>

            {/* Flash feedback */}
            {flash === 'in' && (
              <div className="fade-in text-center py-4 rounded-xl font-extrabold text-2xl bg-green-100 text-green-700 border-2 border-green-300">
                ✅ ĐÃ CHO XE VÀO
              </div>
            )}
            {flash === 'out' && (
              <div className="fade-in text-center py-4 rounded-xl font-extrabold text-2xl bg-orange-100 text-orange-700 border-2 border-orange-300">
                🔴 ĐÃ CHO XE RA
              </div>
            )}

            <div>
              <label className="label-lg">🏢 Chọn Đơn vị / Công ty</label>
              <select
                className="select-lg"
                value={selectedCompanyId}
                onChange={e => setSelectedCompanyId(e.target.value)}
              >
                <option value="">-- Chọn công ty --</option>
                {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>

            {selected && (
              <>
                {/* Status Banner */}
                <div className={`rounded-xl px-5 py-5 text-center border-2 ${isFull ? 'bg-red-50 border-red-300' : isNearFull ? 'bg-yellow-50 border-yellow-300' : 'bg-green-50 border-green-300'} fade-in`}>
                  <div className={`text-3xl font-extrabold ${isFull ? 'text-red-600' : isNearFull ? 'text-yellow-600' : 'text-green-600'}`}>
                    {isFull ? '🚫 HẾT CHỖ / HẾT HỢP ĐỒNG' : isNearFull ? `⚠️ SẮP ĐẦY – ${selected.current}/${selected.quota} xe` : `✅ HỢP LỆ – Đã vào ${selected.current}/${selected.quota} xe`}
                  </div>
                  <div className={`text-base mt-2 font-semibold ${isFull ? 'text-red-400' : isNearFull ? 'text-yellow-500' : 'text-green-500'}`}>
                    Còn trống: {selected.quota - selected.current} chỗ · HĐ: {selected.expiry}
                  </div>
                </div>

                {/* Progress Bar */}
                <div>
                  <div className="flex justify-between text-sm font-semibold text-gray-500 mb-1">
                    <span>Đã sử dụng</span>
                    <span>{Math.round((selected.current / selected.quota) * 100)}%</span>
                  </div>
                  <div className="h-5 bg-gray-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full rounded-full transition-all duration-500 ${isFull ? 'bg-red-500' : isNearFull ? 'bg-yellow-400' : 'bg-green-500'}`}
                      style={{ width: `${Math.min((selected.current / selected.quota) * 100, 100)}%` }}
                    />
                  </div>
                </div>

                <div>
                  <label className="label-lg">🚗 Biển số xe (tuỳ chọn)</label>
                  <input
                    className="input-lg"
                    placeholder="Nhập biển số xe đang vào/ra"
                    value={plate}
                    onChange={e => setPlate(e.target.value)}
                  />
                </div>

                {/* Big Action Buttons */}
                <div className="grid grid-cols-2 gap-4 mt-2">
                  <button
                    onClick={() => handleGateAction('in')}
                    disabled={isFull}
                    className={`btn-success py-5 text-xl flex flex-col items-center gap-1 ${isFull ? 'opacity-40 cursor-not-allowed' : ''}`}
                  >
                    <Icon name="log-in" size={30} />
                    <span>CHO XE VÀO</span>
                    <span className="text-sm font-normal opacity-80">(+1 xe)</span>
                  </button>
                  <button
                    onClick={() => handleGateAction('out')}
                    disabled={selected.current <= 0}
                    className={`btn-danger py-5 text-xl flex flex-col items-center gap-1 ${selected.current <= 0 ? 'opacity-40 cursor-not-allowed' : ''}`}
                  >
                    <Icon name="log-out" size={30} />
                    <span>CHO XE RA</span>
                    <span className="text-sm font-normal opacity-80">(-1 xe)</span>
                  </button>
                </div>
              </>
            )}

            {!selected && (
              <div className="flex-1 flex flex-col items-center justify-center text-gray-300 py-10">
                <Icon name="mouse-pointer-click" size={48} />
                <p className="mt-3 text-lg font-semibold">Vui lòng chọn đơn vị để bắt đầu</p>
              </div>
            )}
          </div>

          {/* RIGHT: Quota Table + Log */}
          <div className="flex flex-col gap-5">
            {/* Quota Table */}
            <div className="card p-5">
              <h3 className="font-extrabold text-gray-900 text-lg mb-4 flex items-center gap-2">
                <Icon name="bar-chart-2" size={20} className="text-blue-600" /> Quota Theo Dõi Realtime
              </h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-gray-100">
                      <th className="text-left py-2 px-2 text-xs font-bold text-gray-400 uppercase">Đơn vị</th>
                      <th className="text-center py-2 px-2 text-xs font-bold text-gray-400 uppercase">Đang trong bãi</th>
                      <th className="text-center py-2 px-2 text-xs font-bold text-gray-400 uppercase">Hạn mức</th>
                      <th className="text-center py-2 px-2 text-xs font-bold text-gray-400 uppercase">Trạng thái</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {companies.map(c => {
                      const pct = c.current / c.quota;
                      const full = c.current >= c.quota;
                      const near = !full && pct >= 0.8;
                      return (
                        <tr key={c.id} className={`${selectedCompanyId == c.id ? 'bg-blue-50' : ''}`}>
                          <td className="py-2.5 px-2 font-medium text-gray-800" style={{ maxWidth: 120 }}>{c.name}</td>
                          <td className="py-2.5 px-2 text-center font-extrabold text-2xl text-gray-900">{c.current}</td>
                          <td className="py-2.5 px-2 text-center text-gray-500">{c.quota}</td>
                          <td className="py-2.5 px-2 text-center">
                            {full ? <span className="badge-danger">HẾT CHỖ</span> : near ? <span className="badge-warn">SẮP ĐẦY</span> : <span className="badge-ok">Còn chỗ</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Gate Log */}
            <div className="card p-5 flex-1 overflow-hidden flex flex-col">
              <h3 className="font-extrabold text-gray-900 text-lg mb-4 flex items-center gap-2">
                <Icon name="clock" size={20} className="text-gray-500" /> Nhật Ký Cổng Hôm Nay
              </h3>
              <div className="overflow-y-auto space-y-2 flex-1">
                {log.map((l, i) => (
                  <div key={i} className="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
                    <span className="text-sm font-bold text-gray-400 w-12 flex-shrink-0">{l.time}</span>
                    <span className={`text-xs font-extrabold px-2 py-1 rounded-md flex-shrink-0 ${l.action === 'VÀO' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{l.action}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-semibold text-gray-800 truncate">{l.company}</div>
                      <div className="text-xs text-gray-400">{l.plate}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────── TAB 3: LIFT / LOWER ───────────────
    function LiftTab() {
      const [form, setForm] = useState({ company: '', weight: '', action: 'NÂNG', hasCrew: false });
      const [liftState, setLiftState] = useState('idle'); // idle | started | done
      const [startTime, setStartTime] = useState(null);
      const [endTime, setEndTime] = useState(null);
      const [history, setHistory] = useState(LIFT_HISTORY);
      const [elapsedSec, setElapsedSec] = useState(0);

      useEffect(() => {
        let interval = null;
        if (liftState === 'started') {
          interval = setInterval(() => {
            setElapsedSec(sec => sec + 1);
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [liftState]);

      const formatTime = (date) => date ? date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--';
      const formatElapsed = (sec) => {
        const m = Math.floor(sec / 60), s = sec % 60;
        return `${m} phút ${s} giây`;
      };

      const company = COMPANIES.find(c => c.id === Number(form.company));
      const companyValid = company && company.current > 0;

      const handleStart = () => {
        if (!form.company || !form.weight) return;
        const now = new Date();
        setStartTime(now);
        setElapsedSec(0);
        setLiftState('started');
      };

      const handleDone = () => {
        const now = new Date();
        setEndTime(now);
        setLiftState('done');
        const start = formatTime(startTime);
        const end = formatTime(now);
        const mins = Math.round(elapsedSec / 60);
        const newEntry = {
          id: `LH-${String(history.length + 46).padStart(4, '0')}`,
          company: company?.name || form.company,
          action: form.action,
          weight: Number(form.weight),
          hasCrew: form.hasCrew,
          start,
          end,
          duration: `${mins} phút`,
          date: now.toLocaleDateString('vi-VN'),
        };
        setHistory([newEntry, ...history]);
      };

      const handleReset = () => {
        setLiftState('idle');
        setStartTime(null);
        setEndTime(null);
        setElapsedSec(0);
        setForm({ company: '', weight: '', action: 'NÂNG', hasCrew: false });
      };

      return (
        <div className="fade-in grid grid-cols-1 lg:grid-cols-2 gap-6">
          {/* LEFT: Form */}
          <div className="card p-6 flex flex-col gap-5">
            <div>
              <h2 className="text-xl font-extrabold text-gray-900 flex items-center gap-2">
                <Icon name="arrow-up-down" size={24} className="text-blue-600" /> Lệnh Nâng Hạ Hàng Hóa
              </h2>
              <p className="text-sm text-gray-500 mt-1">Điền thông tin → BẮT ĐẦU → HOÀN THÀNH</p>
            </div>

            {/* Timer Display */}
            {liftState !== 'idle' && (
              <div className={`rounded-xl p-5 text-center fade-in ${liftState === 'started' ? 'bg-blue-50 border-2 border-blue-200' : 'bg-green-50 border-2 border-green-200'}`}>
                {liftState === 'started' ? (
                  <>
                    <div className="text-sm font-bold text-blue-500 uppercase tracking-wider">⏱ ĐANG THỰC HIỆN</div>
                    <div className="text-4xl font-extrabold text-blue-700 mt-1">{formatElapsed(elapsedSec)}</div>
                    <div className="text-sm text-blue-400 mt-1">Bắt đầu: {formatTime(startTime)}</div>
                  </>
                ) : (
                  <>
                    <div className="text-sm font-bold text-green-600 uppercase tracking-wider">✅ ĐÃ HOÀN THÀNH</div>
                    <div className="text-3xl font-extrabold text-green-700 mt-1">{formatElapsed(elapsedSec)}</div>
                    <div className="text-sm text-green-500 mt-1">{formatTime(startTime)} → {formatTime(endTime)}</div>
                  </>
                )}
              </div>
            )}

            <div>
              <label className="label-lg">🏢 Đơn vị / Công ty đối tác</label>
              <select
                className="select-lg"
                value={form.company}
                onChange={e => setForm({ ...form, company: e.target.value })}
                disabled={liftState !== 'idle'}
              >
                <option value="">-- Chọn đơn vị --</option>
                {COMPANIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              {form.company && !companyValid && (
                <p className="text-sm text-red-500 mt-1 font-semibold">⚠️ Đơn vị này hiện không có xe trong bãi!</p>
              )}
            </div>

            <div>
              <label className="label-lg">⚖️ Trọng tải hàng hóa (tấn)</label>
              <input
                className="input-lg"
                type="number"
                min="0.1"
                step="0.1"
                placeholder="Ví dụ: 18.5"
                value={form.weight}
                onChange={e => setForm({ ...form, weight: e.target.value })}
                disabled={liftState !== 'idle'}
              />
            </div>

            <div>
              <label className="label-lg">🔄 Tác vụ</label>
              <div className="grid grid-cols-2 gap-3 mt-1">
                {['NÂNG', 'HẠ'].map(opt => (
                  <button
                    key={opt}
                    type="button"
                    onClick={() => liftState === 'idle' && setForm({ ...form, action: opt })}
                    disabled={liftState !== 'idle'}
                    className={`py-4 rounded-xl text-xl font-extrabold border-2 transition-all ${form.action === opt
                      ? (opt === 'NÂNG' ? 'bg-blue-600 text-white border-blue-600' : 'bg-orange-500 text-white border-orange-500')
                      : 'bg-white text-gray-400 border-gray-200'}`}
                  >
                    {opt === 'NÂNG' ? '⬆ NÂNG' : '⬇ HẠ'}
                  </button>
                ))}
              </div>
            </div>

            <label className={`flex items-center gap-3 cursor-pointer select-none rounded-xl p-4 border-2 transition-all ${form.hasCrew ? 'bg-purple-50 border-purple-300' : 'bg-gray-50 border-gray-100'} ${liftState !== 'idle' ? 'opacity-50 cursor-not-allowed' : ''}`}>
              <input
                type="checkbox"
                className="w-6 h-6 accent-purple-600"
                checked={form.hasCrew}
                onChange={e => liftState === 'idle' && setForm({ ...form, hasCrew: e.target.checked })}
                disabled={liftState !== 'idle'}
              />
              <div>
                <div className="font-bold text-gray-800 text-base">Có bao gồm đổ công (nhân công thủ công)?</div>
                <div className="text-xs text-gray-400 mt-0.5">Tích chọn nếu có nhân công bốc xếp đi kèm</div>
              </div>
            </label>

            {/* Action Buttons */}
            <div className="grid grid-cols-1 gap-3 mt-1">
              {liftState === 'idle' && (
                <button
                  onClick={handleStart}
                  disabled={!form.company || !form.weight}
                  className={`btn-primary py-5 text-xl flex items-center justify-center gap-3 ${(!form.company || !form.weight) ? 'opacity-40 cursor-not-allowed' : ''}`}
                >
                  <Icon name="play-circle" size={28} /> BẮT ĐẦU NÂNG / HẠ
                </button>
              )}
              {liftState === 'started' && (
                <button
                  onClick={handleDone}
                  className="btn-success py-5 text-xl flex items-center justify-center gap-3 animate-pulse"
                >
                  <Icon name="check-circle-2" size={28} /> HOÀN THÀNH
                </button>
              )}
              {liftState === 'done' && (
                <button onClick={handleReset} className="btn-warning py-4 text-lg flex items-center justify-center gap-3">
                  <Icon name="refresh-cw" size={22} /> Tạo lệnh mới
                </button>
              )}
            </div>
          </div>

          {/* RIGHT: History */}
          <div className="card p-6 flex flex-col gap-4 overflow-hidden">
            <div className="flex items-center justify-between">
              <h3 className="font-extrabold text-gray-900 text-lg flex items-center gap-2">
                <Icon name="history" size={20} className="text-gray-500" /> Lịch Sử Nâng Hạ Hôm Nay
              </h3>
              <span className="text-sm text-gray-400 font-semibold">{history.length} lệnh</span>
            </div>
            <div className="overflow-y-auto space-y-3 flex-1">
              {history.map((h, i) => (
                <div key={h.id} className="border border-gray-100 rounded-lg p-4 bg-white">
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className={`text-sm font-extrabold px-2 py-0.5 rounded ${h.action === 'NÂNG' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}`}>
                          {h.action === 'NÂNG' ? '⬆ NÂNG' : '⬇ HẠ'}
                        </span>
                        <span className="text-xs text-gray-400 font-mono">{h.id}</span>
                      </div>
                      <div className="font-semibold text-gray-800 mt-1 text-sm">{h.company}</div>
                      <div className="text-sm text-gray-600 mt-0.5">
                        <span className="font-bold">{h.weight} tấn</span>
                        {h.hasCrew && <span className="ml-2 text-purple-600 text-xs font-semibold">+ Đổ công</span>}
                      </div>
                      <div className="text-xs text-gray-400 mt-1">
                        {h.start} → {h.end} · <span className="font-semibold text-gray-600">{h.duration}</span>
                      </div>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <span className="badge-ok">Hoàn thành</span>
                      <div className="text-xs text-gray-400 mt-1">{h.date}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────── APP ROOT ───────────────
    function App() {
      const [activeTab, setActiveTab] = useState('maintenance');

      const renderContent = () => {
        if (activeTab === 'maintenance') return <MaintenanceTab />;
        if (activeTab === 'gate') return <GateTab />;
        if (activeTab === 'lift') return <LiftTab />;
      };

      const tabMeta = {
        maintenance: { title: 'Quản Lý Bảo Dưỡng Xe', icon: 'wrench', desc: 'Tạo lệnh công việc và quản lý xuất kho vật tư' },
        gate: { title: 'Kiểm Soát Cổng & Hợp Đồng', icon: 'shield-check', desc: 'Theo dõi quota xe ra/vào theo đơn vị hợp đồng' },
        lift: { title: 'Lệnh Nâng Hạ Hàng Hóa', icon: 'arrow-up-down', desc: 'Ghi nhận thời gian và thông tin nâng hạ để đối soát' },
      };
      const meta = tabMeta[activeTab];

      return (
        <div className="flex h-screen overflow-hidden" style={{ background: '#F3F4F6' }}>
          {/* Sidebar */}
          <Sidebar active={activeTab} setActive={setActiveTab} />

          {/* Main */}
          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
            <Topbar activeTab={activeTab} />

            {/* Page Header */}
            <div className="px-6 pt-5 pb-3 border-b border-gray-200 bg-white flex items-center gap-3">
              <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ background: '#EFF6FF' }}>
                <Icon name={meta.icon} size={22} className="text-blue-600" />
              </div>
              <div>
                <h1 className="text-xl font-extrabold text-gray-900">{meta.title}</h1>
                <p className="text-sm text-gray-500">{meta.desc}</p>
              </div>
            </div>

            {/* Content */}
            <main className="flex-1 overflow-y-auto p-6">
              {renderContent()}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
